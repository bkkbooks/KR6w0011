body:
  text: 如是我聞一時佛在毗羅勒國栴檀精舍中與諸菩衆三万人俱二千五百羅漢四部之衆天龍八部皆來雲集𠇍時世尊入於三昧寂無言時諸弟子心生疑惑怪佛所以各自相謂云何世尊默然永無言我衆有何利益爾時阿難坐而起叉手前白佛言巍巍天尊其意難側我等今日請何法問何事思何義受何利益佛今默然更無言三界衆生增益邪見便自相向悲涕流淚哀歎曰今日如來入於三昧何時惺悟於時世尊即放眉間白豪一光照曜十方遍恆沙界時諸弟子心生歡喜得未曾有各各恭敬立住一面爾時佛告諸弟子𥊸我所一切大衆各皆合掌聽佛所佛言我觀三界空無所有亦無堅固復無有實亦無停息諸法空寂因緣故有和合則生亦可演亦不可爾時觀世音菩白佛言世尊法若可便應不無不無之法便應可佛言善緣合則有緣散則離諸法如是緣而生緣滅則盡觀世音菩白佛言如佛所實不也爾時阿難白佛言世尊如向所甚難思議亦難測度如佛所實將不今便問佛云何名斯經佛告阿難此經名觀世音三昧經我於往昔為菩時常見過去佛讀誦斯經吾今成佛亦復讀誦未曾休息我今成佛良由此經此經眀聖難可比度喻如日光能照幽𡨋此經亦爾若有比丘比丘𡰱優婆塞優婆夷受持此經者真我弟子流通正法法將眀矣三寶不滅興隆正覺盲𡨋受悟若有衆生得聞此經念而不忘五劫不墮阿鼻地獄當知此觀世音三昧經正是良藥救人苦難除煩惱千劫万劫不墮𢙣趣當知斯經名大法王法化於人受道百千万億此經難聞亦復難見譬如摩𡰱寶珠其眀甚盛照百千界人見歡喜都無憂惱此經亦爾若人得聞必離𢙣道爾時阿難重白佛言云何行此經復何應現佛言阿難若欲行此經應淨房舍中懸諸蓋散花燒香端坐七日念無異想誦此觀世音三昧經爾時觀世音即自現身其形紫金色身長丈二項背日光其色似白銀手捉蓮花現其人前七日之中日有一事初一日時現栴檀勳陸香使行人聞之二日之時於夜半中現大光眀行人得見心大歡喜三日之時現一蓮華大如車輪其華甚盛猶白銀色四日之時現天人身身長一丈身著天衣現彼人前行人見已同共娛樂論諸法五日之時即自現身證得三昧自見過去生死劫六日之時復現天宮五色雜寶所作有四菩端坐法行人見已漸漸心眀眀徹十方即大歡喜奉心敬禮七日之時觀世音菩即自現身其光晃曜眀過於日行人見已心甚荒迫觀世音菩即舉左手摩行人頂心得安隱復舉右手指於西方妙樂國土行人尋時即見西方無量國國土清淨琉璃寶樹華薗浴池𩂜𩂜皆有行人見已煩惱消除無眀根此諸行人世世所生常與觀世音相值復見𨶒浮提雜類國土猶如掌中阿摩勒果復見東方阿閦佛國不動如來登王高坐其諸菩多有眷屬為人法其地平正名華浴池𩂜𩂜皆有復見北方鬱單日國彼土人民壽命長遠永無正法可以習誦命終之時當墮𢙣道復見上方香積佛國蓮華林茂經行禪室悉為香華多饒菩復見下方百千万國金剛諸國金剛城金剛坐其諸菩悉在坐上為人法行人見已即得六通具八解脫得無得智飛到十方隨意即至千劫万劫百千億劫度人無量得神通力具陀羅𡰱辨才無滯樂甚多當知此經是大威力七日七夜讀誦此經如前所都無事若有者我即忘語諸餘經典皆不可信阿難坐而起合掌讚佛世尊金剛惠語出皆真實一切諸衆生頗有不信者若不信此經將墮𢙣道中巍巍天中天頗有不歸佛我見魔波旬首來宗仰今觀世音三昧經典爾時佛告阿難此經亦名安隱𩂜亦名離惱患亦名除疑惑亦名離𢙣道若有比丘犯四重禁五無間罪若比丘𡰱犯八重禁放恣精神串六情破壞正法若有優婆塞優婆夷犯五逆罪若有能行此觀世音三昧經如向所衆罪悉滅無餘亦見十方淨妙國土如前所等無有異佛告阿難若人受持讀誦斯經典者應持此呪難聞亦難值若持此呪應斷酒肉不食五辛瞋恚怒悉為當斷諸女色悉復不為清淨梵行之人乃能受持斯呪南無佛阤一觀音大呪二南無達摩三觀音眀呪四南無僧伽五觀音神呪六拘摩賴阤七阤波當八阿達鄧九豆十賴波阤十一賴摩尼伽𡰱伽十三蛇多達多十四阿由他十五阿䨱唐十六丘唐十七阿兜耶十八䨱兜耶十九阿由提草斯摩賴阤草一浮多耶草二伽阤波草三伽阤利草四波神呿草五佉阤那唎草六伽阿波草七沙呵如此神呪諸佛如來皆當讀誦不獨我也佛告阿難若有受持讀誦斯方等經當知此人是大菩薩於我滅後開化十方一切衆生便得聞之皆離𢙣道終不墮地獄餓鬼畜生持此經者若入大水水即乾竭若入大火火即消滅若遭大賊刀箭即折若遭懸官枷鎖即裂若入地獄苦毒變樂若有衆生欲得天眼通者天耳通者他心智通者宿命通者漏盡通者身中通者當持此經七日七夜自觀身中內外穢𢙣流逸不淨即得六通無得解脫欲得離地獄者不作畜生者欲得見十方世界者欲得長壽者欲得值佛聞法者欲須淨妙國圡生者欲得捨𢙣身者欲得捨女人身者欲得遠離八難者欲得作沙門者欲得中國生者欲得生天者當持此經讀誦受持持是經者慎莫放逸必如所願爾時阿難從坐而起而白佛言觀世音有何神力威神乃爾佛今稱歎其德不輊佛告阿難我今道實其事不虛我𫝹觀世音菩薩於我前成佛號曰正法眀如來應供正遍知眀行足善逝世間解無上士調御丈夫天人師佛世尊我於彼時為彼佛下作苦行苐子受持斯經七日七夜讀誦不忘復不𫝹食不𫝹五欲即見十方百千諸佛在我前立於斯悟道今得成佛號曰釋迦牟𡰱受持斯經猶故讀誦况復今日汝等諸人宜應受持莫令懈怠何以故觀世音菩薩有大威神力故現神通力故救衆生故度苦難故現紫磨身故欲便行人得成道故當知此觀世音三昧經甚難思議不可分別汝等阿難於我滅後急應流通此經此經出時當有衆魔比丘及比丘尼毀破諸戒無法自持猶如天牛𪋀鹿無法自持徒為沙門飲酒食宍姼淫五欲不自制斷猶如外道無戒可持命終當墮阿鼻地獄億劫受罪出為畜生如斯人輩不信此經自相謂言此經非佛所説魔所説耳便相告語焚燒此經竸共破壞如斯人輩增益𢙣道千劫万劫終無有得復人身時諸三昧經何其𣸪聞唯有須阤洹人乃至十住菩薩當信此經流行此經佛告阿難此經出時當衆法眀時白衣賢者生天無量受道万億當有出家比丘比丘𡰱甚不精進多貪財物聚積𥻦帛多作生業養育畜生常與獦師淫女國主酤酒屠兒魁膾以為親犮如斯人輩永不見佛若能讀誦受持斯經典者罪漸漸自然滅若不讀此經必當墮𢙣道爾時世尊以偈頌曰佛告阿難叵思議光眀甚盛照十方摧滅三界魔波旬拔除苦愡觀世音普現一切大神通受持斯經讀誦書不墮𢙣道離諸見七日七夜菩薩現手摩行人頂上時行人心中無有疑掃地清淨嚴一房思惟觀音三昧經即現十方如眼前備足六通一時間受持斯經解苦空觀三界理眀眼徹永離苦難三𢙣道讀誦斯經是真實除五蓋心離四魔得離生死煩愡河於時踊躍得身通稽首禮佛觀世音三昧方等度諸人其不信者墮𢙣道説此偈時有一樹枼如車輪技敷茷普䨱十方蓋大千花中化佛異同音其形甚好身紫金演説法味義甚深各各賫花來散佛普及大衆觀世音作天伎樂出妙聲於時十方佛來聽魔王荒迫心中驚釋迦如來乘空行觀音菩薩即現身於時大衆悟道真度脫衆生果報因同時讚歎奇哉佛現金色身作十力行人修道得如是阿難稽首過去佛於先滅度今已出號觀世音大菩薩稽首無上天中天大勢菩薩觀世音能度十方苦難人我今稽首難思議普現十方魔皆知破滅魔宮碎殿時是故稽首正法王哀哉無量事難當拔地獄苦生天宮今故稽首現世間威神無量淨國圡得離生死未來苦爾時佛告阿難汝當受持此經開化聾盲便得聞見必得悟道若有人能受持此經當得五種果報何等為五一者離生死苦滅煩愡賊二者常與十方諸佛同生一處出則隨出滅則隨滅生生之處不離佛邊三者彌勒出世之時當為三會初首四者不墮𢙣道地獄餓鬼畜生阿修羅中五者生處常值淨妙國圡是為五種果報佛告阿難世有五種人不得成佛一者邊地國圡常懷怒𢙣興師相伐國國自相戰鬪共相煞害晝夜思惟𫝹欲相欺以是之故常生難處二者栴陀羅人心中常𫝹食噉人血行於冢間覓人死尸無時停息三者破戒比丘及比丘尼於佛法中破是戒賊心懷嫉妒加誈他人狂生是非自稱喻好道他人𢙣見善不説自𢙣不道無一𫝹生悔㥽四者多淫之人不避親踈道俗尊卑晝夜思𫝹無時停息無有一𫝹𫝹衆善法五者出家還俗毀壞道法向世間人稱説言語道佛無聖佛無神力佛不能得度人猶毀謗故墮𢙣道徑歷諸趣常懷苦愡若能受持觀世音三昧經者改往修來受持斯經七日七夜讀誦通利衆罪消盡如向果報復能終生行道誦習斯經未曾廢忘若忘失者我於夢中即教此人還令得故即説偈言佛告諸比丘我𫝹過去世苦行超九劫初得菩提心誦習此經典於其七日間即得見十方過去未來佛悉現在我前受持觀世音三昧方等經由是成正覺普現金剛身觀見三界事猶若如掌中有見地獄苦救濟令得出十力四無畏得悟神通力遊騰遍十方或大還復小今見觀世音如我等無異俱時成正覺爾時大衆諸天帝釋及於天人聞斯經已恭敬起立繞佛三匝即悟須陀洹道五千比丘道成阿羅漢六百五十比丘尼道成阿那含時衆人民皆悟無上正真之道天龍鬼神四輩弟子咸皆歡喜作禮而去
