  - {type: indent, offset: 1386, content: 　, id: KR6w0011_D_001-bkkind1}
  - {type: variant, offset: 1386, length: 1908, content: 南无佛阤(一)　觀音大呪(二)　南无達摩(三)　觀音眀呪(四)　南无僧伽(五)　觀音神呪(六)　拘摩頼阤(七)　阤波當(八)　阿達鄧(九)　豆󸝵(十)　頼波阤(十一)　頼摩尼伽　𡰱伽(十三)　虵多達多(十四)　阿由他(十五)　阿䨱唐(十六)　丘唐(十七)　阿兜耶(十八)　䨱兜耶(十九)　阿由提(廿)　斯摩頼阤(廿一)　浮多耶(廿二)　伽阤波(廿三)　伽阤利(廿四)　波神𠳷(廿五)　佉阤𨚗唎(廿六)　伽阿波(廿七)　沙呵　如此神呪諸佛如来𣅜當讀誦不獨我也佛告阿難若有受持讀誦斯方等經當知此人是大菩薩於我烕後𨳩化十方一切眾生便得聞之𣅜離𢙣道終不堕地獄餓鬼畜生持此經者若入大水水即乾竭若入大火火即消㓕若遭大賊刀箭即折若遭懸官枷鏁即裂若入地獄苦毒變樂　若有眾生欲得天眼通者天耳通者他心智通者宿命通者漏盡通者身中通者當持此經七日七夜自觀身中內外穢𢙣𣴑𨓜不浄即得六通无㝵解脫欲得離地獄者不作畜生者欲得見十方世界者欲得長壽者欲得值佛聞法者欲湏浄妙國圡生者欲得捨𢙣身者欲得捨女人身者欲得遠離八難者欲得作沙門者欲得中國生者欲得生天者當持此經讀誦受持持是經者慎莫放𨓜必如𠩄願尒時阿難従㘴而起而白佛言觀世音有何神力威神乃尒佛今稱歎其德不輊佛告阿難我今道實其事不虛我𫝹觀世音菩薩於我前成佛号曰正法眀如来應供正遍知眀行𠯁善逝世閒解无上士調御丈夫天人師佛世尊我於彼時為彼佛下作苦行苐子受持斯經七日七夜讀誦不忘復不𫝹食不𫝹五欲即見十方百千諸佛在我前立於斯悟道今得成佛号曰𥼶迦𠫚𡰱受持斯經猶故讀誦况復今日汝䒭諸人宜應受持莫令懈怠何以故觀世音菩薩有大威神力故現神通力故救眾生故度苦難故現紫磨身故欲便行人得成道故當知此觀世音三昧經甚難思議不可分別汝䒭阿難於我㓕後急應𣴑通此經此經出時當有衆魔比丘及比丘尼毀破諸𢦶无法自持猶如天牛𪋀鹿无法自持徒為沙門飲酒食宍姼婬五欲不自制断猶如外道无𢦶可持命終當堕阿鼻地獄億刧受罪出為畜生如斯人輩不信此經自相謂言此經非佛𠩄說魔𠩄說耳便相告語焚燒此經竸共破壊如斯人輩增益𢙣道千刧万刧終无有得復人身時諸三昧經何其𣸪聞唯有湏阤洹人乃至十住菩薩當信此經𣴑行此經佛告阿難此經出時當衆法眀時白衣賢者生天无量受道万億當有出家比丘比丘𡰱甚不精進多貪財物聚積𥼆帛多作生業養育畜生常與獦師婬女國主酤酒屠𧠇魁膾以為親犮如斯人輩永不見佛若能讀誦受持斯經典者罪漸漸自然㓕若不讀此經必當堕𢙣道尒時世尊以偈頌曰　佛告阿難叵思議　光眀甚盛照十方　摧㓕三界魔波旬　拔除苦愡觀世音　普現一切大神通　受持斯經讀誦書　不堕𢙣道離諸見　七日七夜菩薩現　手摩行人頂上時　行人心中无有疑　掃地清浄嚴一房　思惟觀音三昧經　即現十方如眼前　備𠯁六通一時閒　受持斯經解苦空　觀三界理眀眼澈　永離苦難三𢙣道　讀誦斯經是真實　除五盖心離四魔　得離生死煩愡河　於時踊躍得身通　稽首𥘍佛觀世音　三昧方䒭度諸人　其不信者堕𢙣道　說此偈時有一樹　枼如車輪技敷茷　普䨱十方盖大千　花中化佛異同音　其形甚好身紫金　演說法味義甚深　各各賷花来散佛　普及大衆觀世音　作天伎樂出妙聲　於時十方佛来聽　魔王荒迫心中驚　𥼶迦如来乗空行　觀音菩薩即現身　於時大衆悟道真　度脫衆生果報囙　同時讚歎奇㦲佛　現金色身作十力　行人脩道得如是　阿難稽首過去佛　於先㓕度今已出　号觀世音大菩薩　稽首无上天中天　大勢菩薩觀世音　能度十方苦難人　我今稽首難思議　普現十方魔𣅜知　破㓕魔宮碎殿時　是故稽首正法王　哀㦲无量事難當　拔地獄苦生天宮　今故稽首現世閒　威神无量浄國圡　得離生死未来苦　尒時佛告阿難汝當受持此經𨳩化聾盲便得聞見必得悟道若有人能受持此經當得五種果報何䒭為五一者離生死苦㓕煩愡賊二者常與十方諸佛同生一處出則随出㓕則随㓕生生之處不離佛邊三者弥勒出世之時當為三會初首四者不堕𢙣道地獄餓鬼畜生阿脩羅中五者生處常值浄妙國圡是為五種果報佛告阿難世有五種人不得成佛一者邊地國圡常懷怒𢙣興師相伐國國自相戰鬪共相煞𡧱晝夜思惟𫝹欲相欺以是之故常生難處二者栴陁羅人心中常𫝹食噉人血行於冢閒覓人死尸无時停息三者破𢦶比丘及比丘尼於佛法中破是𢦶賊心懷嫉妒加誈他人狂生是非自稱喻好道他人𢙣見善不說自𢙣不道无一𫝹生悔㥽四者多婬之人不避親踈道𢓾尊卑晝夜思𫝹无時停息无有一𫝹𫝹衆善法五者出家還𢓾毀壞道法向世閒人稱說言語道佛无聖佛无神力佛不能得度人猶毀謗故堕𢙣道逕歷諸趣常懷苦愡若能受持觀世音三昧經者改往脩来受持斯經七日七夜讀誦通利衆罪消盡如向果報復能終生行道誦習斯經未曾廢忘若忘失者我於夢中即教此人還令得故即說偈言　佛告諸比丘　我𫝹過去世　苦行超九刧　初得菩提心　誦習此經典　於其七日閒　即得見十方　過去未来佛　𢘻現在我前　受持觀世音　三昧方䒭經　由是成正覺　普現金𡬺身　觀見三界事　猶若如掌中　有見地獄苦　救濟令得出　十力四无畏　得悟神通力　遊騰遍十方　或大還復小　今見觀世音　如我䒭无異　俱時成正覺　尒時大衆諸天帝𥼶及於天人聞斯經已恭敬起立繞佛三迊即悟湏陁洹道五千比丘道成阿羅漢六百五十比丘尼道成阿那含時衆人民𣅜悟无上正真之道天龍鬼神四軰弟子咸𣅜歡喜作礼而去《佛說觀世音三昧經》（京都国立博物館藏本第2張第22-95行）, 國圖: ''}
