body:
  text: 如是我聞一時佛在毗羅勒國栴檀精舎中與諸菩眾三万人俱二千五百羅漢四部之眾天龍八部皆來雲集𠇍時世尊入於三昧𡧘无言時諸弟子心生疑惑恠佛所以各自相謂云何世尊嘿然永无言我眾有何利益尒時阿難坐而起叉手前白佛言巍巍天尊其意難側我䒭今日請何法問何事思何義受何利益佛今嘿然更無言三界眾生增益邪見便自相向悲涕流淚哀歎曰今日如來入於三昧何時惺悟於時世尊即放眉間白豪一光照曜十方遍恒沙界時諸弟子心生歡喜得未曾有各各恭敬立住一面尒時佛告諸弟子𦗟我所一切大眾各皆合掌聽佛所佛言我觀三界空无所有亦无堅固復无有實亦无停息諸法空寂囙緣故有和合則生亦可演亦不可尒時觀世音菩白佛言世尊法若可便應不无不无之法便應可佛言善緣合則有緣散則離諸法如是緣而生緣㓕則盡觀世音菩白佛言如佛所實不也尒時阿難白佛言世尊如向所甚難思議亦難測度如佛所實將不今便問佛云何名斯經佛告阿難此經名觀世音三昧經我於往昔為菩時常見過去佛讀誦斯經吾今成佛亦復讀誦未曾休息我今成佛良由此經此經眀聖難可比度喻如日光能照幽𡨋此經亦尒若有比丘比丘𡰱優婆塞優婆夷受持此經者真我弟子流通正法法將眀矣三寶不㓕興隆正覺盲𡨋受悟若有眾生得聞此經念而不忘五刼不堕阿鼻地獄當知此觀世音三昧經正是良藥救人苦難除煩𢙉千刼万刼不堕𢙣趣當知斯經名大法王法化於人受道百千万億此經難聞亦復難見譬如摩𡰱寶珠其眀甚盛照百千界人見歡喜都无憂𢙉此經亦尒若人得聞必離𢙣道尒時阿難重白佛言云何行此經復何應現佛言阿難若欲行此經應淨房舎中懸諸盖散花燒香端坐七日念无異想誦此觀世音三昧經尒時觀世音即自現身其形紫金色身長丈二項背日光其色似白銀手捉蓮花現其人前七日之中日有一事初一日時現栴檀勳陸香使行人聞之二日之時於夜半中現大光眀行人得見心大歡喜三日之時現一蓮華大如車輪其華甚盛猶白銀色四日之時現天人身身長一丈身著天衣現彼人前行人見已同共娛樂論諸法五日之時即自現身證得三昧自見過去生死刼六日之時復現天宮五色雜寶所作有四菩端坐法行人見已漸漸心眀眀徹十方即大歡喜奉心敬礼七日之時觀世音菩即自現身其光晃曜眀過於日行人見已心甚荒迫觀世音菩即舉左手摩行人頂心得安隱復舉右手指於西方妙樂國土行人尋時即見西方无量國國土清淨琉璃寶樹華薗浴池𩂜𩂜皆有行人見已煩𢙉消除无眀根此諸行人世世所生常與觀世音相值復見𨶒浮提雜類國土猶如掌中阿摩勒果復見東方阿閦佛國不動如來登王高坐其諸菩多有眷属為人法其地平正名華浴池𩂜𩂜皆有復見北方欝單日國彼土人民壽命長遠永无正法可以習誦命終之時當堕𢙣道復見上方香積佛國蓮華林茂經行禪室𢘻為香華多饒菩復見下方百千万國金剛諸國金剛城金剛坐其諸菩𢘻在坐上為人法行人見已即得六通具八解脫得无㝵智飛到十方随意即至千刼万刼百千億刼度人無量得神通力具陁羅𡰱辯才无滯樂甚多當知此經是大威力七日七夜讀誦此經如前所都无事若有者我即忘語諸餘經典皆不可信阿難坐而起合掌讚佛世尊金剛恵語出皆真實一切諸眾生頗有不信者若不信此經將堕𢙣道中巍巍天中天頗有不歸佛我見魔波旬首來宗仰今觀世音三昧經典尒時佛告阿難此經亦名安隱𩂜亦名離𢙉患亦名除疑惑亦名離𢙣道若有比丘犯四重禁五无間罪若比丘𡰱犯八重禁放恣精神串六情破壞正法若有優婆塞優婆夷犯五𨒫罪若有能行此觀世音三昧經如向所眾罪𢘻㓕无餘亦見十方淨妙國土如前所䒭无有異佛告阿難若人受持讀誦斯經典者應持此呪難聞亦難值若持此呪應断酒肉不食五辛瞋恚怒𢘻為當断諸女色𢘻復不為清淨梵行之人乃能受持斯呪南无佛阤一觀音大呪二南无達摩三觀音眀呪四南无僧伽五觀音神呪六拘摩頼阤七阤波當八阿達鄧九豆十頼波阤十一頼摩尼伽𡰱伽十三虵多達多十四阿由他十五阿䨱唐十六丘唐十七阿兜耶十八䨱兜耶十九阿由提廿斯摩頼阤廿一浮多耶廿二伽阤波廿三伽阤利廿四波神𠳷廿五佉阤𨚗唎廿六伽阿波廿七沙呵如此神呪諸佛如来𣅜當讀誦不獨我也佛告阿難若有受持讀誦斯方等經當知此人是大菩薩於我烕後𨳩化十方一切眾生便得聞之𣅜離𢙣道終不堕地獄餓鬼畜生持此經者若入大水水即乾竭若入大火火即消㓕若遭大賊刀箭即折若遭懸官枷鏁即裂若入地獄苦毒變樂若有眾生欲得天眼通者天耳通者他心智通者宿命通者漏盡通者身中通者當持此經七日七夜自觀身中內外穢𢙣𣴑𨓜不浄即得六通无㝵解脫欲得離地獄者不作畜生者欲得見十方世界者欲得長壽者欲得值佛聞法者欲湏浄妙國圡生者欲得捨𢙣身者欲得捨女人身者欲得遠離八難者欲得作沙門者欲得中國生者欲得生天者當持此經讀誦受持持是經者慎莫放𨓜必如𠩄願尒時阿難従㘴而起而白佛言觀世音有何神力威神乃尒佛今稱歎其德不輊佛告阿難我今道實其事不虛我𫝹觀世音菩薩於我前成佛号曰正法眀如来應供正遍知眀行𠯁善逝世閒解无上士調御丈夫天人師佛世尊我於彼時為彼佛下作苦行苐子受持斯經七日七夜讀誦不忘復不𫝹食不𫝹五欲即見十方百千諸佛在我前立於斯悟道今得成佛号曰𥼶迦𠫚𡰱受持斯經猶故讀誦况復今日汝䒭諸人宜應受持莫令懈怠何以故觀世音菩薩有大威神力故現神通力故救眾生故度苦難故現紫磨身故欲便行人得成道故當知此觀世音三昧經甚難思議不可分別汝䒭阿難於我㓕後急應𣴑通此經此經出時當有衆魔比丘及比丘尼毀破諸𢦶无法自持猶如天牛𪋀鹿无法自持徒為沙門飲酒食宍姼婬五欲不自制断猶如外道无𢦶可持命終當堕阿鼻地獄億刧受罪出為畜生如斯人輩不信此經自相謂言此經非佛𠩄說魔𠩄說耳便相告語焚燒此經竸共破壊如斯人輩增益𢙣道千刧万刧終无有得復人身時諸三昧經何其𣸪聞唯有湏阤洹人乃至十住菩薩當信此經𣴑行此經佛告阿難此經出時當衆法眀時白衣賢者生天无量受道万億當有出家比丘比丘𡰱甚不精進多貪財物聚積𥼆帛多作生業養育畜生常與獦師婬女國主酤酒屠𧠇魁膾以為親犮如斯人輩永不見佛若能讀誦受持斯經典者罪漸漸自然㓕若不讀此經必當堕𢙣道尒時世尊以偈頌曰佛告阿難叵思議光眀甚盛照十方摧㓕三界魔波旬拔除苦愡觀世音普現一切大神通受持斯經讀誦書不堕𢙣道離諸見七日七夜菩薩現手摩行人頂上時行人心中无有疑掃地清浄嚴一房思惟觀音三昧經即現十方如眼前備𠯁六通一時閒受持斯經解苦空觀三界理眀眼澈永離苦難三𢙣道讀誦斯經是真實除五盖心離四魔得離生死煩愡河於時踊躍得身通稽首𥘍佛觀世音三昧方䒭度諸人其不信者堕𢙣道說此偈時有一樹枼如車輪技敷茷普䨱十方盖大千花中化佛異同音其形甚好身紫金演說法味義甚深各各賷花来散佛普及大衆觀世音作天伎樂出妙聲於時十方佛来聽魔王荒迫心中驚𥼶迦如来乗空行觀音菩薩即現身於時大衆悟道真度脫衆生果報囙同時讚歎奇㦲佛現金色身作十力行人脩道得如是阿難稽首過去佛於先㓕度今已出号觀世音大菩薩稽首无上天中天大勢菩薩觀世音能度十方苦難人我今稽首難思議普現十方魔𣅜知破㓕魔宮碎殿時是故稽首正法王哀㦲无量事難當拔地獄苦生天宮今故稽首現世閒威神无量浄國圡得離生死未来苦尒時佛告阿難汝當受持此經𨳩化聾盲便得聞見必得悟道若有人能受持此經當得五種果報何䒭為五一者離生死苦㓕煩愡賊二者常與十方諸佛同生一處出則随出㓕則随㓕生生之處不離佛邊三者弥勒出世之時當為三會初首四者不堕𢙣道地獄餓鬼畜生阿脩羅中五者生處常值浄妙國圡是為五種果報佛告阿難世有五種人不得成佛一者邊地國圡常懷怒𢙣興師相伐國國自相戰鬪共相煞𡧱晝夜思惟𫝹欲相欺以是之故常生難處二者栴陁羅人心中常𫝹食噉人血行於冢閒覓人死尸无時停息三者破𢦶比丘及比丘尼於佛法中破是𢦶賊心懷嫉妒加誈他人狂生是非自稱喻好道他人𢙣見善不說自𢙣不道无一𫝹生悔㥽四者多婬之人不避親踈道𢓾尊卑晝夜思𫝹无時停息无有一𫝹𫝹衆善法五者出家還𢓾毀壞道法向世閒人稱說言語道佛无聖佛无神力佛不能得度人猶毀謗故堕𢙣道逕歷諸趣常懷苦愡若能受持觀世音三昧經者改往脩来受持斯經七日七夜讀誦通利衆罪消盡如向果報復能終生行道誦習斯經未曾廢忘若忘失者我於夢中即教此人還令得故即說偈言佛告諸比丘我𫝹過去世苦行超九刧初得菩提心誦習此經典於其七日閒即得見十方過去未来佛𢘻現在我前受持觀世音三昧方䒭經由是成正覺普現金𡬺身觀見三界事猶若如掌中有見地獄苦救濟令得出十力四无畏得悟神通力遊騰遍十方或大還復小今見觀世音如我䒭无異俱時成正覺尒時大衆諸天帝𥼶及於天人聞斯經已恭敬起立繞佛三迊即悟湏陁洹道五千比丘道成阿羅漢六百五十比丘尼道成阿那含時衆人民𣅜悟无上正真之道天龍鬼神四軰弟子咸𣅜歡喜作礼而去
